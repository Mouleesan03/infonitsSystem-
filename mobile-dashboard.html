<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Dashboard - Infonits</title>
    <style>
      :root {
        --bg: #f2f6ff;
        --bg-2: #e9f0ff;
        --card: #ffffff;
        --text: #111b34;
        --muted: #5f7091;
        --line: #d6e1f2;
        --primary: #1f2f67;
        --primary-2: #273d7f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(520px 340px at 100% -12%, #dce9ff 0%, transparent 68%),
          radial-gradient(680px 380px at -20% 0%, var(--bg-2) 0%, transparent 74%),
          var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 680px; margin: 0 auto; padding: 14px 12px 24px; }
      .card {
        background: var(--card);
        border: 1px solid #d9e5f6;
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 28px rgba(16, 32, 76, 0.08);
      }
      h1 { margin: 0; font-size: 1.35rem; }
      p { margin: 4px 0 0; color: var(--muted); font-size: 0.82rem; }
      .grid { margin-top: 12px; display: grid; gap: 10px; }
      .btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        border: 1px solid #d6e1f2;
        border-radius: 12px;
        min-height: 52px;
        padding: 0 14px;
        color: #1d2e63;
        font-weight: 700;
        background: #f8fbff;
      }
      .btn.primary {
        color: #ffffff;
        border: 0;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 10px 20px rgba(31, 47, 103, 0.24);
      }
      .arrow { opacity: 0.7; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Mobile Dashboard</h1>
        <p>Quick access for daily mobile updates.</p>
        <div class="grid">
          <a class="btn primary" href="./mobile-payment-update.html?v=20260521-sync">
            <span>Finance (Payment)</span>
            <span class="arrow">›</span>
          </a>
          <a class="btn" href="./mobile-invoice-update.html?v=20260521-sync">
            <span>Invoice</span>
            <span class="arrow">›</span>
          </a>
          <a class="btn" href="./mobile-project-update.html?v=20260521-sync">
            <span>Project</span>
            <span class="arrow">›</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
