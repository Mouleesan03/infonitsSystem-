<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Mobile - Infonits</title>
    <style>
      :root {
        --bg: #f3f6fc;
        --bg-2: #eaf1ff;
        --card: #ffffff;
        --text: #111b34;
        --muted: #5f7091;
        --line: #d6e1f2;
        --focus: #83a7ff;
        --primary: #1f2f67;
        --primary-2: #273d7f;
        --chip: #eef3ff;
        --green: #14b8a6;
        --blue: #3b82f6;
        --red: #ef4444;
        --amber: #f59e0b;
        --gold: #a16207;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(520px 340px at 100% -12%, #dce9ff 0%, transparent 68%),
          radial-gradient(680px 380px at -20% 0%, var(--bg-2) 0%, transparent 74%),
          var(--bg);
        color: var(--text);
      }
      .wrap { width: min(100%, 460px); margin: 0 auto; padding: 12px; }
      .card {
        background: var(--card);
        border: 1px solid #d9e5f6;
        border-radius: 22px;
        padding: 12px;
        box-shadow: 0 10px 28px rgba(16, 32, 76, 0.08);
      }
      .card + .card { margin-top: 10px; }
      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #5f7091;
        font-size: 0.78rem;
        font-weight: 800;
      }
      .time-pill {
        border: 1px solid #dbe6f6;
        border-radius: 999px;
        min-width: 54px;
        text-align: center;
        padding: 6px 10px;
        color: #1b2947;
        background: rgba(255, 255, 255, 0.78);
      }
      .hero { margin-top: 12px; }
      .hero-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .back-btn {
        width: 42px;
        height: 42px;
        border: 1px solid #dbe6f6;
        border-radius: 12px;
        background: #ffffff;
        color: #65779b;
        font-size: 1.75rem;
        line-height: 1;
        font-weight: 800;
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow: 0 5px 14px rgba(31, 47, 103, 0.08);
      }
      h1 { margin: 0; font-size: 1.9rem; line-height: 1; letter-spacing: -0.05em; }
      .muted { margin: 6px 0 0; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
      .top-actions {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      .btn {
        border: 0;
        border-radius: 14px;
        min-height: 42px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary {
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 10px 20px rgba(31, 47, 103, 0.24);
      }
      .btn.soft { background: var(--chip); color: #253353; border: 1px solid #d5e1f5; }
      .summary-grid { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .summary-card {
        border: 1px solid #dce6f5;
        border-radius: 12px;
        background: #f8fbff;
        padding: 10px;
      }
      .summary-card span { display: block; color: #6c7ea2; font-size: 0.67rem; font-weight: 800; }
      .summary-card strong { display: block; margin-top: 5px; font-size: 0.98rem; color: #1d2e63; }
      .summary-card em { display: block; margin-top: 5px; font-style: normal; font-size: 0.65rem; font-weight: 800; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
      .dot.green { background: var(--green); }
      .dot.blue { background: var(--blue); }
      .dot.red { background: var(--red); }
      .dot.amber { background: var(--amber); }
      .dot.gold { background: var(--gold); }
      .meta-green { color: var(--green); }
      .meta-blue { color: var(--blue); }
      .meta-red { color: var(--red); }
      .meta-amber { color: var(--amber); }
      .meta-gold { color: var(--gold); }
      .section-row {
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .section-title {
        color: #6c7ea2;
        font-size: 0.86rem;
        font-weight: 900;
        letter-spacing: 0.02em;
      }
      .section-helper {
        color: #6c7ea2;
        font-size: 0.86rem;
        font-weight: 900;
      }
      .filters {
        margin-top: 8px;
        border: 1px solid #dbe7f8;
        border-radius: 14px;
        padding: 10px;
        background: #fbfdff;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }
      label { font-size: 0.78rem; font-weight: 650; display: grid; gap: 5px; color: #334766; }
      .filters .full { grid-column: 1 / -1; }
      input, select, textarea {
        width: 100%;
        border: 1px solid #cfdcf0;
        border-radius: 10px;
        min-height: 40px;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        background: #fdfefe;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--focus);
        outline: none;
        box-shadow: 0 0 0 3px rgba(131, 167, 255, 0.2);
      }
      textarea { min-height: 80px; resize: vertical; }
      .row-2 { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
      .grid { display: grid; gap: 9px; }
      .hidden { display: none !important; }
      .status { margin-top: 3px; font-size: 0.82rem; min-height: 18px; font-weight: 600; }
      .record-list { display: grid; gap: 8px; margin-top: 10px; }
      .record-item {
        border: 1px solid #d9e5f6;
        border-radius: 14px;
        background: #fff;
        padding: 10px;
        border-left: 5px solid #d9e5f6;
      }
      .record-item.income { border-left-color: var(--green); }
      .record-item.expense, .record-item.loan { border-left-color: var(--red); }
      .record-item.saving { border-left-color: var(--blue); }
      .record-item.gold { border-left-color: var(--gold); }
      .record-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .chips { display: flex; align-items: center; gap: 6px; }
      .chip { border-radius: 999px; padding: 3px 10px; font-size: 0.69rem; font-weight: 800; background: #eef3ff; color: #2c3f66; }
      .chip.status { background: #e4eaf5; color: #4a5f82; min-height: auto; }
      .record-amount { font-weight: 700; color: #182750; }
      .record-meta { margin-top: 4px; color: #5f6f89; font-size: 0.76rem; line-height: 1.35; }
      .record-actions { margin-top: 8px; display: grid; grid-template-columns: 1fr auto; gap: 8px; }
      .btn.edit { min-height: 36px; padding: 0 14px; background: #e8eefb; color: #22386e; border: 1px solid #d4e0f4; }
      .btn.delete { min-height: 34px; padding: 0 10px; background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
      .pager {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }
      .pager button {
        min-width: 34px;
        min-height: 34px;
        border: 1px solid #d5e1f5;
        border-radius: 10px;
        background: #edf3ff;
        color: #253353;
        font-weight: 700;
      }
      .pager span {
        font-size: 0.78rem;
        color: #5f6f89;
        font-weight: 600;
      }
      @media (max-width: 480px) {
        .row-2 { grid-template-columns: 1fr; }
        .summary-grid { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="topline">
          <span id="financePeriod">MAY 2026 · FINANCE</span>
          <span class="time-pill" id="financeTime">9:41</span>
        </div>
        <header class="hero">
          <div class="hero-head">
            <div>
              <h1>Monthly Finance</h1>
              <p class="muted">Mobile finance dashboard and records.</p>
            </div>
            <button class="back-btn" id="financeBackButton" type="button" aria-label="Go back">‹</button>
          </div>
        </header>

        <div class="top-actions">
          <button class="btn primary" id="toggleAddRecordButton" type="button">+ Add record</button>
          <button class="btn soft" id="refreshFinanceButton" type="button">Refresh</button>
        </div>

        <section class="summary-grid">
          <article class="summary-card"><span><i class="dot green"></i>PROJECT PROFIT</span><strong id="sumProjectProfit">Rs. 0</strong><em id="sumProjectProfitMeta" class="meta-green">0%</em></article>
          <article class="summary-card"><span><i class="dot blue"></i>INCOME</span><strong id="sumIncome">Rs. 0</strong><em id="sumIncomeMeta" class="meta-blue">0%</em></article>
          <article class="summary-card"><span><i class="dot red"></i>UNPAID EXPENSES</span><strong id="sumUnpaid">Rs. 0</strong><em id="sumUnpaidMeta" class="meta-red">0 overdue</em></article>
          <article class="summary-card"><span><i class="dot amber"></i>BALANCE</span><strong id="sumBalance">Rs. 0</strong><em id="sumBalanceMeta" class="meta-amber">this month</em></article>
          <article class="summary-card"><span><i class="dot green"></i>SAVINGS</span><strong id="sumSavings">Rs. 0</strong><em id="sumSavingsMeta" class="meta-green">+Rs. 0</em></article>
          <article class="summary-card"><span><i class="dot gold"></i>GOLD ASSETS</span><strong id="sumGold">Rs. 0</strong><em id="sumGoldMeta" class="meta-gold">+0 entry</em></article>
        </section>

        <div class="section-row">
          <div class="section-title">FILTER</div>
        </div>
        <div class="filters">
          <label>Month <input id="financeMonthFilter" type="month" /></label>
          <label>Type
            <select id="financeTypeFilter">
              <option value="all">All types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
              <option value="loan">Loan</option>
              <option value="saving">Saving</option>
              <option value="gold">Gold</option>
            </select>
          </label>
          <label class="full">Category <input id="financeCategoryFilter" placeholder="All categories" /></label>
        </div>

        <div class="section-row">
          <div class="section-title">RECORDS</div>
          <div class="section-helper" id="financeRecordCount">0 of 0</div>
        </div>
        <section id="addRecordPanel" class="card hidden" style="margin-top:10px; padding:10px; box-shadow:none;">
          <div class="grid">
            <div class="row-2">
              <label>Type
                <select id="financeType">
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                  <option value="loan">Loan</option>
                  <option value="saving">Saving</option>
                  <option value="gold">Gold</option>
                </select>
              </label>
              <label>Status
                <select id="financeStatus">
                  <option value="paid">Paid / done</option>
                  <option value="unpaid">Unpaid / pending</option>
                </select>
              </label>
            </div>
            <label>Client
              <select id="paymentClient"></select>
            </label>
            <label>Project (optional)
              <select id="paymentProject"></select>
            </label>
            <div class="row-2">
              <label>Date <input id="paymentDate" type="date" /></label>
              <label>Amount (LKR) <input id="paymentAmount" type="number" min="0" step="0.01" value="0" /></label>
            </div>
            <label>Category <input id="financeCategory" placeholder="Client payment / Hosting / Other" /></label>
            <label>Method
              <select id="paymentMethod">
                <option value="Bank transfer">Bank transfer</option>
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
                <option value="Online">Online</option>
              </select>
            </label>
            <label>Reference (optional) <input id="paymentReference" placeholder="TXN / Invoice no" /></label>
            <label>Note <textarea id="paymentNote" placeholder="Optional note"></textarea></label>
            <button class="btn primary" id="savePaymentButton" type="button">Save record</button>
            <p class="status" id="paymentStatusText"></p>
          </div>
        </section>

        <section class="record-list" id="financeRecordList"></section>
        <div class="pager">
          <button id="financePrevPage" type="button" aria-label="Previous page">‹</button>
          <span id="financePageLabel">Page 1 of 1</span>
          <button id="financeNextPage" type="button" aria-label="Next page">›</button>
        </div>
      </section>
    </main>
    <script src="supabase-config.js?v=20260521-sync"></script>
    <script src="mobile-auth.js?v=20260521-sync"></script>
    <script src="mobile-payment-update.js?v=20260521-sync"></script>
  </body>
</html>
