<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Update - Infonits</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #64748b;
        --line: #d9e2ef;
        --primary: #1d2e63;
        --primary-2: #273d7f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 14px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      h1, h2 { margin: 0 0 6px; }
      .muted { margin: 0; color: var(--muted); font-size: 0.92rem; }
      .grid { display: grid; gap: 10px; margin-top: 10px; }
      label { font-size: 0.9rem; font-weight: 600; display: grid; gap: 6px; }
      input, select, textarea {
        width: 100%;
        border: 1px solid #c8d4e4;
        border-radius: 10px;
        min-height: 44px;
        padding: 10px 12px;
        font: inherit;
        color: var(--text);
        background: #fbfdff;
      }
      textarea { min-height: 90px; resize: vertical; }
      .row-2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        min-height: 46px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: var(--primary);
      }
      .btn:active { background: var(--primary-2); }
      .btn.secondary {
        background: #e8eef7;
        color: #1a274a;
      }
      .hidden { display: none !important; }
      .status {
        margin-top: 10px;
        font-size: 0.9rem;
        color: #0f172a;
      }
      @media (max-width: 480px) {
        .row-2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" id="formCard">
        <h1>Post Update</h1>
        <p class="muted">Mobile only: add posted update to Post Tracker.</p>
        <h2>Add posted update</h2>
        <div class="grid">
          <label>Client
            <select id="postClient"></select>
          </label>
          <label>Project
            <select id="postProject"></select>
          </label>
          <div class="row-2">
            <label>Posted date <input id="postDate" type="date" /></label>
            <label>Count <input id="postCount" type="number" min="1" value="1" /></label>
          </div>
          <label>Platform
            <select id="postPlatform">
              <option>Facebook</option>
              <option>Instagram</option>
              <option>TikTok</option>
            </select>
          </label>
          <label>Post link (optional) <input id="postLink" /></label>
          <label>Remarks <textarea id="postRemarks" placeholder="Short note"></textarea></label>
          <button class="btn" id="submitButton" type="button">Save update</button>
          <p class="status" id="formStatus"></p>
        </div>
      </section>
    </main>
    <script src="supabase-config.js"></script>
    <script src="mobile-post-update.js"></script>
  </body>
</html>
