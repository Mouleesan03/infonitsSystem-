<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Update - Infonits</title>
    <style>
      :root {
        --bg: #eef3fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #64748b;
        --line: #d7e1ef;
        --primary: #1d2e63;
        --primary-2: #273d7f;
        --focus: #8fb2ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1100px 700px at -20% -10%, #dce8ff 0%, var(--bg) 45%);
        color: var(--text);
      }
      .wrap {
        max-width: 620px;
        margin: 0 auto;
        padding: 18px 14px 22px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 12px;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      }
      h1 { margin: 0; font-size: 2rem; line-height: 1.1; letter-spacing: -0.02em; }
      h2 { margin: 4px 0 0; font-size: 1.65rem; line-height: 1.15; letter-spacing: -0.015em; }
      .muted { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }
      .grid { display: grid; gap: 12px; margin-top: 14px; }
      label { font-size: 0.9rem; font-weight: 600; display: grid; gap: 6px; }
      input, select, textarea {
        width: 100%;
        border: 1px solid #c7d3e6;
        border-radius: 12px;
        min-height: 46px;
        padding: 10px 13px;
        font: inherit;
        color: var(--text);
        background: #fbfdff;
        transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--focus);
        outline: none;
        box-shadow: 0 0 0 3px rgba(143, 178, 255, 0.2);
        background: #ffffff;
      }
      textarea { min-height: 96px; resize: vertical; }
      .row-2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
      .calendar-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }
      .calendar-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 8px 14px;
      }
      .calendar-title-main {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .calendar-title-sub {
        margin: 0;
        color: #64748b;
        font-size: 0.68rem;
        font-weight: 600;
      }
      .calendar-title {
        margin: 6px 0 0;
        font-size: 0.78rem;
        font-weight: 600;
        color: #64748b;
      }
      .calendar-nav-wrap {
        display: flex;
        gap: 6px;
      }
      .calendar-nav {
        border: 1px solid #c7d3e6;
        background: #f7fbff;
        color: #1d2e63;
        border-radius: 9px;
        min-height: 30px;
        min-width: 30px;
        font-weight: 700;
      }
      .calendar-shell {
        margin-top: 10px;
        border: 1px solid #dbe4f0;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }
      .calendar-weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }
      .calendar-weekday {
        text-align: center;
        font-size: 0.58rem;
        color: var(--muted);
        font-weight: 700;
        min-height: 22px;
        display: grid;
        place-items: center;
        border-right: 1px solid #dde6f1;
        border-bottom: 1px solid #dde6f1;
        background: #f9fbff;
      }
      .calendar-weekday:last-child { border-right: 0; }
      .calendar-day {
        border: 0;
        appearance: none;
        -webkit-appearance: none;
        border-right: 1px solid #d0dae8;
        border-bottom: 1px solid #d0dae8;
        min-height: 40px;
        padding: 3px 4px 2px;
        background: #ffffff;
        font-size: 0.64rem;
        color: #24314f;
        text-align: left;
        position: relative;
      }
      .calendar-day:focus { outline: none; }
      .calendar-grid .calendar-day:nth-child(7n) { border-right: 0; }
      .calendar-day.empty { background: #fcfdff; }
      .calendar-day.active {
        background: #f8fbff;
      }
      .calendar-day-top {
        display: flex;
        align-items: start;
        justify-content: space-between;
      }
      .calendar-day-num {
        font-size: 0.64rem;
        font-weight: 600;
        color: #1f2937;
      }
      .calendar-count {
        font-size: 0.55rem;
        font-weight: 600;
        color: #64748b;
      }
      .calendar-dots {
        margin-top: 2px;
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
      }
      .calendar-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        box-shadow: 0 0 0 2px #ffffff, 0 0 0 3px rgba(15, 23, 42, 0.08);
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 12px;
        min-height: 48px;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: var(--primary);
        box-shadow: 0 10px 22px rgba(29, 46, 99, 0.24);
      }
      .btn:active { background: var(--primary-2); }
      .btn.secondary {
        background: #e8eef7;
        color: #1a274a;
      }
      .hidden { display: none !important; }
      .status {
        margin-top: 4px;
        font-size: 0.92rem;
        font-weight: 600;
        color: #0f172a;
      }
      .success-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.38);
        backdrop-filter: blur(7px);
        z-index: 1000;
        padding: 20px;
      }
      .success-overlay.show { display: flex; }
      .success-card {
        width: min(340px, 100%);
        border-radius: 18px;
        border: 1px solid #b7e8c5;
        background: #f0fff4;
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.2);
        text-align: center;
        padding: 22px 18px;
      }
      .success-icon {
        width: 62px;
        height: 62px;
        border-radius: 999px;
        margin: 0 auto 10px;
        display: grid;
        place-items: center;
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(135deg, #16a34a, #22c55e);
      }
      .success-title {
        margin: 0;
        color: #14532d;
        font-size: 1.25rem;
        font-weight: 800;
      }
      .success-text {
        margin: 5px 0 0;
        color: #166534;
        font-size: 0.95rem;
        font-weight: 600;
      }
      @media (max-width: 480px) {
        .row-2 { grid-template-columns: 1fr; }
        .card { padding: 14px; border-radius: 16px; }
        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.5rem; }
        .calendar-title-main { font-size: 1rem; }
        .calendar-day { min-height: 36px; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="calendar-head">
          <div class="calendar-title-row">
            <h2 class="calendar-title-main">Post calendar</h2>
            <p class="calendar-title-sub">Posted updates + upcoming renewals</p>
          </div>
          <div class="calendar-nav-wrap">
            <button class="calendar-nav" id="calPrev" type="button">‹</button>
            <button class="calendar-nav" id="calNext" type="button">›</button>
          </div>
        </div>
        <p class="calendar-title" id="calTitle">Month</p>
        <div class="calendar-shell">
          <div class="calendar-weekdays" id="calWeekdays"></div>
          <div class="calendar-grid" id="calGrid"></div>
        </div>
      </section>

      <section class="card" id="formCard">
        <h1>Post Update</h1>
        <p class="muted">Mobile only: add posted update to Post Tracker.</p>
        <h2>Add posted update</h2>
        <div class="grid">
          <label>Client
            <select id="postClient"></select>
          </label>
          <label>Project
            <select id="postProject"></select>
          </label>
          <div class="row-2">
            <label>Posted date <input id="postDate" type="date" /></label>
            <label>Count <input id="postCount" type="number" min="1" value="1" /></label>
          </div>
          <label>Platform
            <select id="postPlatform">
              <option>Facebook</option>
              <option>Instagram</option>
              <option>TikTok</option>
            </select>
          </label>
          <label>Post link (optional) <input id="postLink" /></label>
          <label>Remarks <textarea id="postRemarks" placeholder="Short note"></textarea></label>
          <button class="btn" id="submitButton" type="button">Save update</button>
          <p class="status" id="formStatus"></p>
        </div>
      </section>
    </main>
    <div class="success-overlay" id="successOverlay" aria-hidden="true">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <p class="success-title">Posted Update Saved</p>
        <p class="success-text">Ready for next update...</p>
      </div>
    </div>
    <script src="supabase-config.js?v=20260521-sync"></script>
    <script src="mobile-auth.js?v=20260521-sync"></script>
    <script src="mobile-post-update.js?v=20260521-sync"></script>
  </body>
</html>
