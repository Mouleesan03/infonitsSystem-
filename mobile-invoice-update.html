<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Mobile - Infonits</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #64748b;
        --line: #d9e3f1;
        --primary: #1f2f67;
        --primary-2: #273d7f;
        --focus: #83a7ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Poppins, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 12px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      }
      .hero {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #f8fbff;
        padding: 10px;
      }
      h1 { margin: 0; font-size: 1.25rem; line-height: 1.15; }
      .muted { margin: 4px 0 0; color: var(--muted); font-size: 0.8rem; }
      .grid { display: grid; gap: 9px; margin-top: 10px; }
      .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      label { display: grid; gap: 5px; color: #334155; font-size: 0.78rem; font-weight: 650; }
      input, select, textarea {
        width: 100%;
        border: 1px solid #cfdcf0;
        border-radius: 10px;
        min-height: 40px;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        background: #ffffff;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--focus);
        outline: none;
        box-shadow: 0 0 0 3px rgba(131, 167, 255, 0.2);
      }
      textarea { min-height: 78px; resize: vertical; }
      .summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        margin-top: 10px;
      }
      .summary div {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px;
        background: #f8fbff;
      }
      .summary span { display: block; color: var(--muted); font-size: 0.68rem; font-weight: 650; }
      .summary strong { display: block; margin-top: 2px; color: #1d2e63; font-size: 1rem; }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 11px;
        min-height: 42px;
        padding: 0 14px;
        font: inherit;
        font-weight: 750;
        color: #ffffff;
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 10px 20px rgba(31, 47, 103, 0.22);
      }
      .btn.secondary {
        color: #1d2e63;
        background: #eef4ff;
        border: 1px solid #d6e1f2;
        box-shadow: none;
      }
      .top-actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
      .filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }
      .hidden { display: none !important; }
      .invoice-list { display: grid; gap: 8px; margin-top: 10px; }
      .invoice-card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 9px;
        background: #ffffff;
      }
      .invoice-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .invoice-card strong { color: #1d2e63; }
      .invoice-card small {
        display: block;
        color: var(--muted);
        font-size: 0.72rem;
        margin-top: 3px;
      }
      .invoice-card-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 7px;
        margin-top: 8px;
      }
      .pager {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 10px;
      }
      .pager button {
        min-width: 34px;
        min-height: 34px;
        border: 1px solid #d6e1f2;
        border-radius: 10px;
        background: #eef4ff;
        color: #1d2e63;
        font-weight: 800;
      }
      .pager span {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 650;
      }
      .status { min-height: 18px; margin: 2px 0 0; font-size: 0.82rem; font-weight: 650; }
      @media (max-width: 480px) {
        .row-2 { grid-template-columns: 1fr; }
        .filters { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <header class="hero">
          <h1>Invoice</h1>
          <p class="muted">Mobile invoice list and quick create.</p>
        </header>
        <div class="top-actions">
          <button class="btn" id="toggleInvoiceFormButton" type="button">+ Create invoice</button>
        </div>
        <div class="filters">
          <label>Search <input id="invoiceSearchFilter" placeholder="Invoice or customer" /></label>
          <label>Type
            <select id="invoiceTypeFilter">
              <option value="All">All types</option>
              <option value="Invoice">Invoice</option>
              <option value="Quotation">Quotation</option>
            </select>
          </label>
          <label>Status
            <select id="invoiceStatusFilter">
              <option value="All">All statuses</option>
              <option value="Unpaid">Unpaid</option>
              <option value="Sent">Sent</option>
              <option value="Paid">Paid</option>
              <option value="Overdue">Overdue</option>
            </select>
          </label>
          <label>Customer <input id="invoiceCustomerFilter" placeholder="Customer" /></label>
        </div>
        <section class="summary hidden" id="invoiceFormSummary">
          <div><span>Invoice no</span><strong id="invoiceNoPreview">-</strong></div>
          <div><span>Total</span><strong id="invoiceTotalPreview">Rs. 0</strong></div>
        </section>
        <div class="grid hidden" id="invoiceFormPanel">
          <div class="row-2">
            <label>Type
              <select id="documentType">
                <option value="Invoice">Invoice</option>
                <option value="Quotation">Quotation</option>
              </select>
            </label>
            <label>Status
              <select id="invoiceStatus">
                <option value="Unpaid">Unpaid</option>
                <option value="Sent">Sent</option>
                <option value="Paid">Paid</option>
              </select>
            </label>
          </div>
          <label>Customer
            <select id="customerName"></select>
          </label>
          <div class="row-2">
            <label>Issue date <input id="invoiceDate" type="date" /></label>
            <label>Due date <input id="dueDate" type="date" /></label>
          </div>
          <div class="row-2">
            <label>Currency
              <select id="invoiceCurrency">
                <option value="LKR">LKR</option>
                <option value="USD">USD</option>
              </select>
            </label>
            <label>Payment method <input id="paymentMethod" placeholder="Bank transfer" /></label>
          </div>
          <label>Service title <input id="itemTitle" placeholder="Service" /></label>
          <label>Description <textarea id="itemDescription" placeholder="Short service details"></textarea></label>
          <div class="row-2">
            <label>Quantity <input id="itemQuantity" type="number" min="0" step="0.01" value="1" /></label>
            <label>Price <input id="itemPrice" type="number" min="0" step="0.01" value="0" /></label>
          </div>
          <div class="row-2">
            <label>Discount <input id="discount" type="number" min="0" step="0.01" value="0" /></label>
            <label>Advance paid <input id="advancePaid" type="number" min="0" step="0.01" value="0" /></label>
          </div>
          <label>Notes <textarea id="notes" placeholder="Optional note"></textarea></label>
          <button class="btn" id="saveInvoiceButton" type="button">Save invoice</button>
          <p class="status" id="invoiceStatusText"></p>
        </div>
        <section class="invoice-list" id="invoiceList"></section>
        <div class="pager">
          <button id="invoicePrevPage" type="button" aria-label="Previous page">‹</button>
          <span id="invoicePageLabel">Page 1 of 1</span>
          <button id="invoiceNextPage" type="button" aria-label="Next page">›</button>
        </div>
      </section>
    </main>
    <script src="supabase-config.js?v=20260521-sync"></script>
    <script src="mobile-invoice-update.js?v=20260521-sync"></script>
  </body>
</html>
